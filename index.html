<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana Ledger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; color: #1a1a2e; font-size: 18px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* ── PIN SCREEN ── */
        #pinScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e3a5f 0%, #2d6a4f 100%); padding: 20px; }
        .pin-card { background: white; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 30px 60px rgba(0,0,0,0.35); text-align: center; }
        .pin-logo { font-size: 64px; margin-bottom: 12px; }
        .pin-title { font-size: 30px; font-weight: 800; margin-bottom: 6px; color: #1a1a2e; }
        .pin-subtitle { font-size: 18px; color: #6b7280; margin-bottom: 32px; }
        #pinInput {
            width: 100%; padding: 20px 16px;
            font-size: 36px; letter-spacing: 16px; text-align: center;
            border: 3px solid #d1d5db; border-radius: 14px;
            font-family: monospace; outline: none; margin-bottom: 14px;
            display: block;
        }
        #pinInput:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.15); }
        #pinInput.pin-error { border-color: #ef4444; animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
        .pin-error-msg { color: #ef4444; font-size: 17px; min-height: 26px; margin-bottom: 14px; font-weight: 700; }
        #pinEnterBtn {
            width: 100%; padding: 22px; background: #3b82f6; color: white;
            font-size: 22px; font-weight: 800; border: none; border-radius: 14px;
            cursor: pointer; display: block;
        }
        #pinEnterBtn:hover { background: #2563eb; }
        #pinEnterBtn:disabled { background: #93c5fd; }
        .pin-hint { margin-top: 18px; font-size: 15px; color: #9ca3af; }
        .spinner { width: 18px; height: 18px; border: 3px solid #ffffff44; border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── APP ── */
        #appWrapper { display: none; }

        /* ── HEADER ── */
        header { background: white; border-bottom: 2px solid #e5e7eb; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; }
        h1 { font-size: 26px; font-weight: 800; }
        .sync-dot { width: 12px; height: 12px; border-radius: 50%; background: #10b981; display: inline-block; margin-left: 10px; }
        .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
        .sync-dot.offline { background: #ef4444; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .btn-logout { background: none; border: 2px solid #d1d5db; color: #6b7280; font-size: 16px; padding: 12px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .btn-logout:hover { background: #f3f4f6; }

        /* ── BIG ACTION BUTTONS (visiting-card size) ── */
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .action-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; padding: 28px 16px;
            border: none; border-radius: 20px; cursor: pointer;
            font-weight: 800; font-size: 22px; color: white;
            min-height: 120px;
            transition: transform 0.12s, box-shadow 0.12s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        .action-card:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .action-card-icon { font-size: 40px; line-height: 1; }
        .action-card-voice { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .action-card-add   { background: linear-gradient(135deg, #2563eb, #1d4ed8); }

        /* ── GENERAL BUTTONS ── */
        button { border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 18px; padding: 14px 20px; transition: transform 0.1s; }
        button:active { transform: scale(0.97); }
        .btn-primary  { background: #3b82f6; color: white; }
        .btn-primary:hover  { background: #2563eb; }
        .btn-success  { background: #059669; color: white; padding: 16px 22px; }
        .btn-success:hover  { background: #047857; }
        .btn-warning  { background: #d97706; color: white; padding: 16px 22px; }
        .btn-warning:hover  { background: #b45309; }
        .btn-danger   { background: #dc2626; color: white; padding: 16px 22px; }
        .btn-danger:hover   { background: #b91c1c; }
        .btn-secondary { background: #e5e7eb; color: #374151; padding: 16px 22px; }
        .btn-secondary:hover { background: #d1d5db; }

        /* ── MAIN ── */
        main { padding: 0 0 40px; }

        /* ── CUSTOMER CARDS ── */
        .customers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .customer-card { background: white; border: 2px solid #e5e7eb; border-radius: 16px; padding: 28px; cursor: pointer; transition: all 0.2s; }
        .customer-card:hover, .customer-card:active { box-shadow: 0 12px 30px rgba(0,0,0,0.12); transform: translateY(-3px); border-color: #3b82f6; }
        .customer-name { font-size: 22px; font-weight: 800; margin-bottom: 18px; color: #1a1a2e; }
        .customer-stats { display: flex; flex-direction: column; gap: 10px; }
        .stat-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 17px; }
        .stat-label { color: #6b7280; font-weight: 600; }
        .stat-value { font-weight: 700; font-size: 18px; }
        .balance-line { border-top: 2px solid #e5e7eb; padding-top: 14px; margin-top: 8px; font-size: 20px; font-weight: 800; }
        .balance-positive { color: #059669; }
        .balance-negative { color: #dc2626; }

        /* ── MODALS ── */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 460px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .modal-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; color: #1a1a2e; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 17px; color: #374151; }
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 16px; border: 2px solid #d1d5db;
            border-radius: 12px; font-family: inherit; font-size: 18px; box-sizing: border-box;
        }
        input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        textarea { resize: vertical; min-height: 90px; }
        .modal-buttons { display: flex; gap: 14px; margin-top: 28px; }
        .modal-buttons button { flex: 1; padding: 18px; font-size: 18px; }

        /* ── DETAIL PAGE ── */
        .detail-page { display: none; }
        .detail-page.active { display: block; }
        .back-button { color: #3b82f6; font-weight: 700; margin-bottom: 20px; background: none; border: none; cursor: pointer; padding: 0; font-size: 20px; display: flex; align-items: center; gap: 8px; }
        .back-button:hover { color: #2563eb; }
        .detail-header { background: white; border-bottom: 2px solid #e5e7eb; margin: 0 -20px 28px; padding: 28px 20px; }
        .customer-title { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        .customer-notes-text { color: #6b7280; font-size: 17px; }
        .edit-button { color: #3b82f6; font-size: 17px; margin-top: 12px; background: none; border: 2px solid #3b82f6; cursor: pointer; padding: 10px 18px; display: inline-block; border-radius: 10px; font-weight: 700; }
        .edit-button:hover { background: #eff6ff; }

        .balance-card { background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); color: white; padding: 28px; border-radius: 16px; margin-bottom: 24px; }
        .balance-card.warning { background: linear-gradient(135deg, #dc2626 0%, #7c3aed 100%); }
        .balance-label { font-size: 18px; opacity: 0.9; margin-bottom: 10px; font-weight: 600; }
        .balance-amount { font-size: 48px; font-weight: 800; line-height: 1; }
        .balance-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; font-size: 16px; }
        .breakdown-label { opacity: 0.75; font-weight: 600; }
        .breakdown-value { font-size: 22px; font-weight: 700; margin-top: 4px; }

        .section { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 2px solid #e5e7eb; }
        .section-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; color: #1a1a2e; }

        /* ── TRANSACTIONS ── */
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 12px; border-bottom: 2px solid #f3f4f6; }
        .transaction-item:last-child { border-bottom: none; }
        .transaction-date { font-weight: 700; font-size: 18px; }
        .transaction-type { color: #6b7280; font-size: 15px; margin-top: 4px; font-weight: 600; }
        .transaction-amount { font-weight: 800; font-size: 22px; }
        .transaction-debit { color: #dc2626; }
        .transaction-payment { color: #059669; }
        .transaction-delete { color: #dc2626; cursor: pointer; font-size: 20px; background: #fee2e2; border: none; padding: 10px 14px; border-radius: 10px; font-weight: 700; }
        .transaction-delete:hover { background: #fecaca; }
        .empty-message { color: #6b7280; font-size: 18px; text-align: center; padding: 28px; font-weight: 600; }

        /* ── PAYMENT FORM ── */
        .payment-form { display: flex; gap: 14px; }
        .payment-form input { flex: 1; font-size: 20px; padding: 16px; }

        /* ── DANGER ZONE ── */
        .danger-zone { border-top: 2px solid #fecaca; padding-top: 24px; display: flex; flex-direction: column; gap: 14px; }

        /* ── VOICE ── */
        .listening-indicator { display: inline-block; width: 12px; height: 12px; background: #dc2626; border-radius: 50%; margin-right: 8px; animation: pulse 1s infinite; }
        .voice-hint { background: #dbeafe; color: #1e40af; padding: 16px; border-radius: 10px; margin-bottom: 18px; font-size: 17px; border-left: 4px solid #3b82f6; font-weight: 600; }
        .parsed-result { background: #dcfce7; border: 2px solid #059669; border-radius: 10px; padding: 20px; margin-top: 18px; }
        .parsed-content { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
        .parsed-name { font-size: 22px; font-weight: 800; }
        .parsed-amount { font-size: 30px; font-weight: 800; color: #059669; }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            h1 { font-size: 20px; }
            .action-card { min-height: 100px; font-size: 20px; padding: 22px 12px; }
            .action-card-icon { font-size: 34px; }
            .customers-grid { grid-template-columns: 1fr; }
            .balance-amount { font-size: 38px; }
            .payment-form { flex-direction: column; }
            .payment-form button { width: 100%; }
            .modal-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pinScreen">
    <div class="pin-card">
        <div class="pin-logo">🏪</div>
        <div class="pin-title">Kirana Ledger</div>
        <div class="pin-subtitle">Enter your shop PIN</div>
        <input type="password" id="pinInput" maxlength="8" placeholder="••••" autocomplete="off">
        <div class="pin-error-msg" id="pinErrorMsg"></div>
        <button id="pinEnterBtn">Enter Shop</button>
        <div class="pin-hint">All staff use the same PIN</div>
    </div>
</div>

<!-- APP -->
<div id="appWrapper">
    <header>
        <div class="container">
            <div class="header-content">
                <div>
                    <h1>🏪 Kirana Ledger <span class="sync-dot syncing" id="syncDot"></span></h1>
                </div>
                <button class="btn-logout" id="logoutBtn">🔒 Lock</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- DASHBOARD -->
        <div id="dashboardView">
            <!-- Big action buttons -->
            <div class="action-bar">
                <button class="action-card action-card-voice" id="voiceBtn">
                    <span class="action-card-icon">🎤</span>
                    Voice Entry
                </button>
                <button class="action-card action-card-add" id="addCustomerBtn">
                    <span class="action-card-icon">➕</span>
                    Add Customer
                </button>
            </div>
            <div id="customersContainer" class="customers-grid"></div>
        </div>

        <!-- DETAIL -->
        <div id="detailView" class="detail-page">
            <button class="back-button" id="backBtn">← Back</button>
            <div class="detail-header">
                <div id="detailCustomerTitle" class="customer-title"></div>
                <div id="detailCustomerNotes" class="customer-notes-text"></div>
                <button id="editCustomerBtn" class="edit-button">✏️ Edit</button>
            </div>
            <div id="detailBalanceCard" class="balance-card"></div>
            <div class="section">
                <div class="section-title">Add Payment</div>
                <div class="payment-form">
                    <input type="number" id="paymentAmount" placeholder="Amount (₹)" min="1" step="1">
                    <button class="btn-success" id="savePaymentBtn">✅ Save Payment</button>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Transactions</div>
                <div id="transactionsContainer"></div>
            </div>
            <div class="section danger-zone">
                <button class="btn-warning" id="archiveBtn">📦 Archive Customer</button>
                <button class="btn-danger"  id="deleteBtn">🗑️ Delete Customer</button>
            </div>
        </div>
    </main>
</div>

<!-- Modals -->
<div id="addCustomerModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">Add New Customer</div>
        <div class="form-group"><label class="form-label">Customer Name *</label><input type="text" id="customerName"></div>
        <div class="form-group"><label class="form-label">Notes (optional)</label><textarea id="customerNotes"></textarea></div>
        <div class="modal-buttons">
            <button class="btn-primary"   id="submitAddCustomer">Add Customer</button>
            <button class="btn-secondary" id="closeAddModal">Cancel</button>
        </div>
    </div>
</div>
<div id="editCustomerModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">Edit Customer</div>
        <div class="form-group"><label class="form-label">Customer Name *</label><input type="text" id="editCustomerName"></div>
        <div class="form-group"><label class="form-label">Notes</label><textarea id="editCustomerNotes"></textarea></div>
        <div class="modal-buttons">
            <button class="btn-primary"   id="submitEditCustomer">Save Changes</button>
            <button class="btn-secondary" id="closeEditModal">Cancel</button>
        </div>
    </div>
</div>
<div id="voiceModal" class="modal">
    <div class="modal-content">
        <div class="modal-title">🎤 Voice Entry</div>
        <div id="voiceContent"></div>
    </div>
</div>
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <div class="modal-title" id="confirmTitle"></div>
        <p id="confirmMessage" style="margin-bottom:28px;color:#6b7280;font-size:18px;font-weight:600"></p>
        <div class="modal-buttons">
            <button id="confirmYes"                style="font-size:18px;padding:18px">Yes</button>
            <button class="btn-secondary" id="confirmNo" style="font-size:18px;padding:18px">Cancel</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
var CORRECT_PIN = '4321';   // ← only this PIN works

// ── FIREBASE INIT ────────────────────────────────────────────────────────────
firebase.initializeApp({
    apiKey:            "AIzaSyDaQPed0WWrMEAnk4au7eGWWClw3OmbF5I",
    authDomain:        "kirana-389ab.firebaseapp.com",
    databaseURL:       "https://kirana-389ab-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "kirana-389ab",
    storageBucket:     "kirana-389ab.firebasestorage.app",
    messagingSenderId: "130371493680",
    appId:             "1:130371493680:web:85ee7fa639adb3f9e3f2f5"
});
var db = firebase.database();

// ── STATE ────────────────────────────────────────────────────────────────────
var shopPath          = null;
var unsubscribers     = [];
var _customers        = {};
var _transactions     = {};
var currentCustomerId = null;

// ── PIN LOGIN ────────────────────────────────────────────────────────────────
document.getElementById('pinEnterBtn').addEventListener('click', attemptLogin);
document.getElementById('pinInput').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') attemptLogin();
});

function attemptLogin() {
    var pin = document.getElementById('pinInput').value.trim();
    document.getElementById('pinErrorMsg').textContent = '';

    if (pin.length < 4) { showPinError('PIN must be at least 4 digits'); return; }

    // ── HARDCODED PIN CHECK ──
    if (pin !== CORRECT_PIN) {
        showPinError('Wrong PIN. Please try again.');
        document.getElementById('pinInput').value = '';
        return;
    }

    var btn = document.getElementById('pinEnterBtn');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span> Opening…';

    db.ref('shops/' + pin + '/meta').once('value').then(function(snap) {
        if (!snap.exists()) {
            return db.ref('shops/' + pin + '/meta').set({ created: new Date().toISOString() });
        }
    }).then(function() {
        sessionStorage.setItem('kirana_pin', pin);
        enterApp(pin);
    }).catch(function(err) {
        showPinError('Cannot connect. Check internet.');
        console.error(err);
        btn.disabled  = false;
        btn.innerHTML = 'Enter Shop';
    });
}

function showPinError(msg) {
    document.getElementById('pinErrorMsg').textContent = msg;
    var input = document.getElementById('pinInput');
    input.classList.add('pin-error');
    setTimeout(function() { input.classList.remove('pin-error'); }, 500);
    var btn = document.getElementById('pinEnterBtn');
    btn.disabled  = false;
    btn.innerHTML = 'Enter Shop';
}

// ── APP ENTRY / EXIT ─────────────────────────────────────────────────────────
function enterApp(pin) {
    shopPath = 'shops/' + pin;
    document.getElementById('pinScreen').style.display  = 'none';
    document.getElementById('appWrapper').style.display = 'block';
    subscribeToFirebase();
}

function logout() {
    unsubscribers.forEach(function(fn) { fn(); });
    unsubscribers = [];
    _customers = {}; _transactions = {};
    shopPath = null; currentCustomerId = null;
    sessionStorage.removeItem('kirana_pin');
    document.getElementById('appWrapper').style.display = 'none';
    document.getElementById('pinScreen').style.display  = 'flex';
    document.getElementById('pinInput').value           = '';
    document.getElementById('pinErrorMsg').textContent  = '';
    document.getElementById('pinEnterBtn').innerHTML    = 'Enter Shop';
    document.getElementById('pinEnterBtn').disabled     = false;
}

// ── REALTIME SYNC ─────────────────────────────────────────────────────────────
function subscribeToFirebase() {
    var syncDot = document.getElementById('syncDot');
    syncDot.className = 'sync-dot syncing';

    var custRef = db.ref(shopPath + '/customers');
    custRef.on('value', function(snap) {
        _customers = snap.val() || {};
        syncDot.className = 'sync-dot';
        currentCustomerId ? renderDetail() : renderDashboard();
    }, function() { syncDot.className = 'sync-dot offline'; });

    var txRef = db.ref(shopPath + '/transactions');
    txRef.on('value', function(snap) {
        _transactions = snap.val() || {};
        currentCustomerId ? renderDetail() : renderDashboard();
    });

    unsubscribers.push(function() { custRef.off(); });
    unsubscribers.push(function() { txRef.off(); });
}

// ── DATA ──────────────────────────────────────────────────────────────────────
function getCustomers()    { return Object.values(_customers); }
function getTransactions() { return Object.values(_transactions); }

function getBalance(customerId) {
    var totalDebit = 0, totalPayment = 0;
    getTransactions().filter(function(t) { return t.customer_id === customerId; }).forEach(function(t) {
        if (t.type === 'debit')   totalDebit   += t.amount;
        if (t.type === 'payment') totalPayment += t.amount;
    });
    return { totalDebit: totalDebit, totalPayment: totalPayment, balance: totalDebit - totalPayment };
}

function getCustomerTx(customerId) {
    return getTransactions()
        .filter(function(t) { return t.customer_id === customerId; })
        .sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
}

function findCustKey(id) {
    var entries = Object.entries(_customers);
    for (var i = 0; i < entries.length; i++) {
        if (entries[i][1].id === id) return entries[i][0];
    }
    return null;
}

function addCustomer(name, notes, callback) {
    var c = { id: Date.now(), name: name.trim(), notes: notes.trim(), status: 'active', created_at: new Date().toISOString() };
    db.ref(shopPath + '/customers').push(c).then(function() { if (callback) callback(c); });
    return c;
}

function updateCustomer(id, name, notes) {
    var key = findCustKey(id);
    if (key) db.ref(shopPath + '/customers/' + key).update({ name: name.trim(), notes: notes.trim() });
}

function archiveCustomer(id) {
    var key = findCustKey(id);
    if (key) db.ref(shopPath + '/customers/' + key).update({ status: 'archived' });
}

function deleteCustomer(id) {
    var key = findCustKey(id);
    if (key) db.ref(shopPath + '/customers/' + key).remove();
    Object.entries(_transactions).forEach(function(entry) {
        if (entry[1].customer_id === id) db.ref(shopPath + '/transactions/' + entry[0]).remove();
    });
}

function addTransaction(customerId, amount, type) {
    var tx = { id: Date.now(), customer_id: customerId, amount: parseFloat(amount), type: type, date: new Date().toISOString() };
    db.ref(shopPath + '/transactions').push(tx);
}

function deleteTx(txId) {
    var entries = Object.entries(_transactions);
    for (var i = 0; i < entries.length; i++) {
        if (entries[i][1].id === txId) { db.ref(shopPath + '/transactions/' + entries[i][0]).remove(); break; }
    }
}

// ── RENDER DASHBOARD ──────────────────────────────────────────────────────────
function renderDashboard() {
    var customers = getCustomers().filter(function(c) { return c.status === 'active'; });
    var container = document.getElementById('customersContainer');
    if (customers.length === 0) {
        container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#6b7280;padding:60px 24px;font-size:20px;font-weight:600">No customers yet.<br>Tap ➕ Add Customer above.</p>';
        return;
    }
    container.innerHTML = customers.map(function(c) {
        var bal = getBalance(c.id);
        var cls = bal.balance > 0 ? 'balance-negative' : 'balance-positive';
        return '<div class="customer-card" onclick="showDetail(' + c.id + ')">' +
            '<div class="customer-name">' + c.name + '</div>' +
            '<div class="customer-stats">' +
            '<div class="stat-item"><span class="stat-label">Debit:</span><span class="stat-value">₹' + bal.totalDebit + '</span></div>' +
            '<div class="stat-item"><span class="stat-label">Paid:</span><span class="stat-value">₹' + bal.totalPayment + '</span></div>' +
            '<div class="stat-item balance-line"><span class="stat-label">Balance:</span><span class="stat-value ' + cls + '">₹' + bal.balance + '</span></div>' +
            '</div></div>';
    }).join('');
}

// ── RENDER DETAIL ─────────────────────────────────────────────────────────────
function renderDetail() {
    var c = getCustomers().find(function(c) { return c.id === currentCustomerId; });
    if (!c) return;
    document.getElementById('detailCustomerTitle').textContent = c.name;
    document.getElementById('detailCustomerNotes').textContent = c.notes || '';
    var bal  = getBalance(c.id);
    var card = document.getElementById('detailBalanceCard');
    card.className = bal.balance > 5000 ? 'balance-card warning' : 'balance-card';
    card.innerHTML =
        '<div class="balance-label">Current Balance</div>' +
        '<div class="balance-amount">₹' + bal.balance + '</div>' +
        '<div class="balance-breakdown">' +
        '<div><div class="breakdown-label">Total Debit</div><div class="breakdown-value">₹' + bal.totalDebit + '</div></div>' +
        '<div><div class="breakdown-label">Total Paid</div><div class="breakdown-value">₹' + bal.totalPayment + '</div></div>' +
        '</div>';
    var txs = getCustomerTx(c.id);
    var con = document.getElementById('transactionsContainer');
    if (txs.length === 0) { con.innerHTML = '<div class="empty-message">No transactions yet</div>'; return; }
    con.innerHTML = txs.map(function(t) {
        var date  = new Date(t.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
        var cls   = t.type === 'debit' ? 'transaction-debit' : 'transaction-payment';
        var sign  = t.type === 'debit' ? '+' : '-';
        var label = t.type === 'debit' ? 'Debit' : 'Payment';
        return '<div class="transaction-item">' +
            '<div><div class="transaction-date">' + date + '</div><div class="transaction-type">' + label + '</div></div>' +
            '<div style="display:flex;align-items:center;gap:14px">' +
            '<div class="transaction-amount ' + cls + '">' + sign + '₹' + t.amount + '</div>' +
            '<button class="transaction-delete" onclick="confirmDeleteTx(' + t.id + ')">❌</button>' +
            '</div></div>';
    }).join('');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showDetail(id) {
    currentCustomerId = id;
    document.getElementById('dashboardView').style.display = 'none';
    document.getElementById('detailView').classList.add('active');
    renderDetail();
}

function showDashboard() {
    currentCustomerId = null;
    document.getElementById('dashboardView').style.display = 'block';
    document.getElementById('detailView').classList.remove('active');
    renderDashboard();
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────────────
function showModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function showConfirm(title, msg, btnLabel, btnClass, onYes) {
    document.getElementById('confirmTitle').textContent   = title;
    document.getElementById('confirmMessage').textContent = msg;
    var yes = document.getElementById('confirmYes');
    yes.textContent = btnLabel;
    yes.className   = btnClass;
    yes.onclick     = onYes;
    showModal('confirmModal');
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('backBtn').addEventListener('click', showDashboard);
document.getElementById('confirmNo').addEventListener('click', function() { closeModal('confirmModal'); });

document.getElementById('addCustomerBtn').addEventListener('click', function() {
    document.getElementById('customerName').value  = '';
    document.getElementById('customerNotes').value = '';
    showModal('addCustomerModal');
    setTimeout(function() { document.getElementById('customerName').focus(); }, 100);
});
document.getElementById('closeAddModal').addEventListener('click', function() { closeModal('addCustomerModal'); });
document.getElementById('submitAddCustomer').addEventListener('click', function() {
    var name = document.getElementById('customerName').value.trim();
    if (!name) { alert('Please enter customer name'); return; }
    addCustomer(name, document.getElementById('customerNotes').value);
    closeModal('addCustomerModal');
});

document.getElementById('editCustomerBtn').addEventListener('click', function() {
    var c = getCustomers().find(function(c) { return c.id === currentCustomerId; });
    document.getElementById('editCustomerName').value  = c.name;
    document.getElementById('editCustomerNotes').value = c.notes || '';
    showModal('editCustomerModal');
});
document.getElementById('closeEditModal').addEventListener('click', function() { closeModal('editCustomerModal'); });
document.getElementById('submitEditCustomer').addEventListener('click', function() {
    var name = document.getElementById('editCustomerName').value.trim();
    if (!name) { alert('Name cannot be empty'); return; }
    updateCustomer(currentCustomerId, name, document.getElementById('editCustomerNotes').value);
    closeModal('editCustomerModal');
});

document.getElementById('savePaymentBtn').addEventListener('click', function() {
    var amount = parseFloat(document.getElementById('paymentAmount').value);
    if (isNaN(amount) || amount <= 0) { alert('Enter a valid amount'); return; }
    var bal = getBalance(currentCustomerId);
    if (amount > bal.balance) { alert('Cannot exceed outstanding balance of ₹' + bal.balance); return; }
    addTransaction(currentCustomerId, amount, 'payment');
    document.getElementById('paymentAmount').value = '';
});

document.getElementById('archiveBtn').addEventListener('click', function() {
    var c = getCustomers().find(function(c) { return c.id === currentCustomerId; });
    showConfirm('Archive Customer?', c.name + ' will be hidden from dashboard.', 'Archive', 'btn-warning', function() {
        archiveCustomer(currentCustomerId);
        closeModal('confirmModal');
        showDashboard();
    });
});

document.getElementById('deleteBtn').addEventListener('click', function() {
    var c = getCustomers().find(function(c) { return c.id === currentCustomerId; });
    showConfirm('Delete Customer?', 'Delete ' + c.name + ' and all transactions? Cannot be undone.', 'Delete', 'btn-danger', function() {
        deleteCustomer(currentCustomerId);
        closeModal('confirmModal');
        showDashboard();
    });
});

function confirmDeleteTx(txId) {
    showConfirm('Delete Transaction?', 'Are you sure?', 'Delete', 'btn-danger', function() {
        deleteTx(txId);
        closeModal('confirmModal');
    });
}

// ── VOICE ─────────────────────────────────────────────────────────────────────
document.getElementById('voiceBtn').addEventListener('click', function() {
    document.getElementById('voiceContent').innerHTML =
        '<div class="voice-hint">Say: "Customer Name Amount" — e.g. "Ramesh 100"</div>' +
        '<div class="form-group"><label class="form-label">Or type here:</label>' +
        '<input type="text" id="voiceInput" placeholder="e.g. Ramesh 100" style="font-size:20px;padding:16px"></div>' +
        '<div id="voiceStatus"></div><div id="voiceParsed"></div>' +
        '<div class="modal-buttons">' +
        '<button class="btn-primary"   id="parseBtn"        style="font-size:18px;padding:18px">Parse</button>' +
        '<button class="btn-secondary" id="closeVoiceModal" style="font-size:18px;padding:18px">Cancel</button></div>';
    showModal('voiceModal');
    document.getElementById('closeVoiceModal').addEventListener('click', function() { closeModal('voiceModal'); });
    document.getElementById('parseBtn').addEventListener('click', parseVoice);
    document.getElementById('voiceInput').addEventListener('keyup', function(e) { if (e.key === 'Enter') parseVoice(); });
    startVoice();
});

function startVoice() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { document.getElementById('voiceStatus').innerHTML = '<p style="color:#dc2626;font-size:17px;font-weight:600">Voice not supported in this browser</p>'; return; }
    var r = new SR();
    r.language = 'en-IN'; r.continuous = false; r.interimResults = false;
    document.getElementById('voiceStatus').innerHTML = '<p style="color:#2563eb;font-size:18px;font-weight:700"><span class="listening-indicator"></span>Listening…</p>';
    r.onresult = function(e) {
        var t = '';
        for (var i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
        document.getElementById('voiceInput').value = t.trim();
        document.getElementById('voiceStatus').innerHTML = '';
        parseVoice();
    };
    r.onerror = function(e) { document.getElementById('voiceStatus').innerHTML = '<p style="color:#dc2626;font-size:17px;font-weight:600">Error: ' + e.error + '</p>'; };
    r.start();
}

function parseVoice() {
    var input = document.getElementById('voiceInput').value.trim();
    var parts = input.split(/\s+/);
    var errEl = document.getElementById('voiceParsed');
    if (parts.length < 2) { errEl.innerHTML = '<p style="color:#dc2626;padding:14px;background:#fee2e2;border-radius:10px;margin-top:16px;font-size:17px;font-weight:600">Say name then amount — e.g. "Ramesh 100"</p>'; return; }
    var amount = parseFloat(parts[parts.length - 1]);
    var name   = parts.slice(0, -1).join(' ');
    if (isNaN(amount) || amount <= 0) { errEl.innerHTML = '<p style="color:#dc2626;padding:14px;background:#fee2e2;border-radius:10px;margin-top:16px;font-size:17px;font-weight:600">Amount must be a number</p>'; return; }
    errEl.innerHTML = '<div class="parsed-result"><div style="font-size:15px;color:#6b7280;font-weight:600">Confirm transaction:</div>' +
        '<div class="parsed-content"><div class="parsed-name">' + name + '</div><div class="parsed-amount">₹' + amount + '</div></div></div>';
    var btn = document.getElementById('parseBtn');
    btn.textContent = 'Confirm ✓';
    btn.className   = 'btn-success';
    btn.onclick     = function() {
        var existing = getCustomers().find(function(c) { return c.name.toLowerCase() === name.toLowerCase(); });
        if (existing) {
            addTransaction(existing.id, amount, 'debit');
            closeModal('voiceModal');
            alert('✓ Added ₹' + amount + ' debit for ' + name);
        } else {
            if (confirm('"' + name + '" doesn\'t exist. Create new customer?')) {
                addCustomer(name, '', function(c) {
                    addTransaction(c.id, amount, 'debit');
                    closeModal('voiceModal');
                    alert('✓ Added ₹' + amount + ' debit for ' + name);
                });
            }
        }
    };
}

// ── AUTO LOGIN ────────────────────────────────────────────────────────────────
var saved = sessionStorage.getItem('kirana_pin');
if (saved && saved === CORRECT_PIN) { enterApp(saved); }
</script>
