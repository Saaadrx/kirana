<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana Ledger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── RESET & BASE ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f7f7f5;
            color: #1c1c1e;
            font-size: 17px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        /* ── COLOUR TOKENS ── */
        /* ink: #1c1c1e  |  muted: #6e6e73  |  rule: #e8e8e3  |  surface: #fff  |  bg: #f7f7f5 */
        /* accent blue: #2563eb  |  green: #16a34a  |  red: #dc2626  |  amber: #d97706 */

        /* ── PIN SCREEN ── */
        #pinScreen {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 24px;
            background: #1c1c1e;
        }
        .pin-card {
            background: #fff; border-radius: 20px; padding: 52px 44px;
            width: 100%; max-width: 380px; text-align: center;
        }
        .pin-logo { font-size: 52px; margin-bottom: 16px; }
        .pin-title { font-size: 26px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
        .pin-subtitle { font-size: 15px; color: #6e6e73; margin-bottom: 32px; }
        #pinInput {
            width: 100%; padding: 18px 12px;
            font-size: 32px; letter-spacing: 14px; text-align: center;
            border: 1.5px solid #e8e8e3; border-radius: 12px;
            font-family: monospace; outline: none; margin-bottom: 12px;
            color: #1c1c1e; background: #f7f7f5;
        }
        #pinInput:focus { border-color: #2563eb; background: #fff; }
        #pinInput.pin-error { border-color: #dc2626; animation: shake 0.35s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%,75%{transform:translateX(-6px)} 50%{transform:translateX(6px)} }
        .pin-error-msg { color: #dc2626; font-size: 14px; min-height: 20px; margin-bottom: 12px; font-weight: 500; }
        #pinEnterBtn {
            width: 100%; padding: 18px; background: #1c1c1e; color: #fff;
            font-size: 17px; font-weight: 600; border: none; border-radius: 12px;
            cursor: pointer; font-family: inherit;
        }
        #pinEnterBtn:hover { background: #333; }
        #pinEnterBtn:disabled { background: #aaa; }
        .pin-hint { margin-top: 16px; font-size: 13px; color: #aaa; }
        .spinner {
            width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block; vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── APP SHELL ── */
        #appWrapper { display: none; }

        /* ── HEADER ── */
        header {
            background: #fff; border-bottom: 1px solid #e8e8e3;
            position: sticky; top: 0; z-index: 10;
        }
        .header-content {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0;
        }
        .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px; }
        .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; flex-shrink: 0; }
        .sync-dot.syncing { background: #d97706; animation: pulse 1.2s infinite; }
        .sync-dot.offline  { background: #dc2626; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .btn-lock {
            font-family: inherit; font-size: 14px; font-weight: 500; color: #6e6e73;
            background: none; border: 1px solid #e8e8e3; border-radius: 8px;
            padding: 9px 14px; cursor: pointer;
        }
        .btn-lock:hover { background: #f7f7f5; }

        /* ── ACTION BAR ── */
        .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 24px 0; }
        .action-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; min-height: 110px; border: none; border-radius: 16px;
            cursor: pointer; font-family: inherit; font-weight: 600; font-size: 17px;
            transition: opacity 0.15s, transform 0.12s;
        }
        .action-card:active { transform: scale(0.97); opacity: 0.85; }
        .action-icon { font-size: 34px; line-height: 1; }
        .action-card-voice { background: #1c1c1e; color: #fff; }
        .action-card-add   { background: #2563eb; color: #fff; }

        /* ── GENERAL BUTTONS ── */
        button { font-family: inherit; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 16px; padding: 13px 18px; transition: opacity 0.15s; }
        button:active { opacity: 0.75; }
        .btn-primary   { background: #2563eb; color: #fff; }
        .btn-success   { background: #16a34a; color: #fff; }
        .btn-warning   { background: #d97706; color: #fff; }
        .btn-danger    { background: #dc2626; color: #fff; }
        .btn-secondary { background: #f0f0ed; color: #1c1c1e; }

        /* ── MAIN ── */
        main { padding-bottom: 48px; }

        /* ── CUSTOMER CARDS ── */
        .customers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .customer-card {
            background: #fff; border: 1px solid #e8e8e3; border-radius: 14px;
            padding: 22px 24px; cursor: pointer; transition: box-shadow 0.18s, border-color 0.18s;
        }
        .customer-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-color: #2563eb; }
        .customer-name { font-size: 20px; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.2px; }
        .stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 15px; }
        .stat-label { color: #6e6e73; }
        .stat-value { font-weight: 600; color: #1c1c1e; }
        .balance-row {
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #e8e8e3; margin-top: 10px; padding-top: 12px;
            font-size: 18px; font-weight: 700;
        }
        .bal-label { color: #6e6e73; font-size: 14px; font-weight: 500; }
        .bal-positive { color: #16a34a; }
        .bal-negative { color: #dc2626; }

        /* ── MODALS ── */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; align-items: flex-end; justify-content: center; padding: 0; }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff; border-radius: 20px 20px 0 0;
            padding: 28px 24px 36px; width: 100%; max-width: 520px;
        }
        .modal-handle { width: 36px; height: 4px; background: #e8e8e3; border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.2px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 14px; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.4px; }
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 14px 16px; border: 1.5px solid #e8e8e3;
            border-radius: 10px; font-family: inherit; font-size: 17px;
            background: #f7f7f5; color: #1c1c1e;
        }
        input:focus, textarea:focus { outline: none; border-color: #2563eb; background: #fff; }
        textarea { resize: vertical; min-height: 80px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 24px; }
        .modal-btns button { flex: 1; padding: 16px; font-size: 17px; }

        /* ── DETAIL PAGE ── */
        .detail-page { display: none; }
        .detail-page.active { display: block; }
        .back-btn {
            font-family: inherit; color: #2563eb; font-weight: 600; font-size: 16px;
            background: none; border: none; cursor: pointer; padding: 20px 0 12px;
            display: flex; align-items: center; gap: 6px;
        }
        .detail-name { font-size: 28px; font-weight: 700; letter-spacing: -0.4px; padding: 0 0 4px; }
        .detail-notes { font-size: 15px; color: #6e6e73; }
        .edit-btn {
            font-family: inherit; font-size: 14px; font-weight: 600; color: #2563eb;
            background: none; border: none; cursor: pointer; padding: 10px 0 0;
            display: block;
        }

        /* ── BALANCE HERO ── */
        .balance-hero {
            background: #1c1c1e; color: #fff;
            border-radius: 16px; padding: 28px 24px; margin: 20px 0;
        }
        .balance-hero.over { background: #7f1d1d; }
        .bh-label { font-size: 13px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
        .bh-amount { font-size: 44px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
        .bh-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.12); padding-top: 16px; }
        .bh-split-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
        .bh-split-val { font-size: 20px; font-weight: 600; }

        /* ── SECTION CARD ── */
        .card { background: #fff; border: 1px solid #e8e8e3; border-radius: 14px; padding: 20px 22px; margin-bottom: 14px; }
        .card-title { font-size: 13px; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

        /* ── PAYMENT ROW ── */
        .payment-row { display: flex; gap: 10px; }
        .payment-row input { flex: 1; font-size: 18px; }
        .payment-row button { white-space: nowrap; padding: 14px 20px; font-size: 16px; }

        /* ── TRANSACTIONS ── */
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0ed; }
        .tx-item:last-child { border-bottom: none; }
        .tx-date { font-size: 15px; font-weight: 600; }
        .tx-type { font-size: 13px; color: #6e6e73; margin-top: 2px; }
        .tx-right { display: flex; align-items: center; gap: 12px; }
        .tx-amount { font-size: 18px; font-weight: 700; }
        .tx-debit   { color: #dc2626; }
        .tx-payment { color: #16a34a; }
        .tx-del { background: none; border: none; font-size: 16px; color: #aaa; cursor: pointer; padding: 6px 8px; border-radius: 6px; }
        .tx-del:hover { background: #fee2e2; color: #dc2626; }
        .empty-msg { color: #aaa; font-size: 15px; text-align: center; padding: 24px 0; }

        /* ── DANGER STRIP ── */
        .danger-strip { display: flex; gap: 10px; padding-top: 4px; }
        .danger-strip button { flex: 1; font-size: 15px; padding: 14px; }

        /* ── VOICE MODAL ── */
        .voice-tip { font-size: 14px; color: #6e6e73; background: #f7f7f5; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; }
        .voice-status { font-size: 15px; font-weight: 600; color: #2563eb; min-height: 24px; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .mic-pulse { width: 10px; height: 10px; background: #dc2626; border-radius: 50%; animation: pulse 0.9s infinite; flex-shrink: 0; }
        .parsed-box { background: #f0fdf4; border: 1.5px solid #16a34a; border-radius: 10px; padding: 16px 18px; margin-top: 14px; display: flex; justify-content: space-between; align-items: center; }
        .parsed-name-text { font-size: 19px; font-weight: 700; }
        .parsed-amt-text  { font-size: 26px; font-weight: 700; color: #16a34a; }

        /* ── RESPONSIVE ── */
        @media (max-width: 580px) {
            .action-card { min-height: 96px; font-size: 16px; }
            .action-icon { font-size: 28px; }
            .customers-grid { grid-template-columns: 1fr; }
            .bh-amount { font-size: 36px; }
            .payment-row { flex-direction: column; }
            .modal-btns { flex-direction: column; }
            .danger-strip { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- ── PIN SCREEN ─────────────────────────────────────────── -->
<div id="pinScreen">
    <div class="pin-card">
        <div class="pin-logo">🏪</div>
        <div class="pin-title">Kirana Ledger</div>
        <div class="pin-subtitle">Enter your shop PIN to continue</div>
        <input type="password" id="pinInput" maxlength="8" placeholder="••••" autocomplete="off">
        <div class="pin-error-msg" id="pinErrorMsg"></div>
        <button id="pinEnterBtn">Open Shop</button>
        <div class="pin-hint">All staff use the same PIN</div>
    </div>
</div>

<!-- ── APP ────────────────────────────────────────────────── -->
<div id="appWrapper">
    <header>
        <div class="container">
            <div class="header-content">
                <div class="header-title">
                    🏪 Kirana Ledger
                    <span class="sync-dot syncing" id="syncDot"></span>
                </div>
                <button class="btn-lock" id="logoutBtn">🔒 Lock</button>
            </div>
        </div>
    </header>

    <main class="container">

        <!-- DASHBOARD -->
        <div id="dashboardView">
            <div class="action-bar">
                <button class="action-card action-card-voice" id="voiceBtn">
                    <span class="action-icon">🎤</span>
                    Voice Entry
                </button>
                <button class="action-card action-card-add" id="addCustomerBtn">
                    <span class="action-icon">＋</span>
                    Add Customer
                </button>
            </div>
            <div id="customersContainer" class="customers-grid"></div>
        </div>

        <!-- DETAIL -->
        <div id="detailView" class="detail-page">
            <button class="back-btn" id="backBtn">‹ Back</button>

            <div id="detailCustomerTitle" class="detail-name"></div>
            <div id="detailCustomerNotes" class="detail-notes"></div>
            <button class="edit-btn" id="editCustomerBtn">Edit details</button>

            <div id="detailBalanceCard" class="balance-hero"></div>

            <div class="card">
                <div class="card-title">Record Payment</div>
                <div class="payment-row">
                    <input type="number" id="paymentAmount" placeholder="₹ Amount" min="1" step="1">
                    <button class="btn-success" id="savePaymentBtn">Save</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Transactions</div>
                <div id="transactionsContainer"></div>
            </div>

            <div class="card danger-strip">
                <button class="btn-warning" id="archiveBtn">Archive</button>
                <button class="btn-danger"  id="deleteBtn">Delete</button>
            </div>
        </div>

    </main>
</div>

<!-- ── MODALS ──────────────────────────────────────────────── -->

<div id="addCustomerModal" class="modal">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-title">New Customer</div>
        <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" id="customerName" placeholder="e.g. Suresh Kumar">
        </div>
        <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea id="customerNotes" placeholder="Optional"></textarea>
        </div>
        <div class="modal-btns">
            <button class="btn-primary"   id="submitAddCustomer">Add</button>
            <button class="btn-secondary" id="closeAddModal">Cancel</button>
        </div>
    </div>
</div>

<div id="editCustomerModal" class="modal">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-title">Edit Customer</div>
        <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" id="editCustomerName">
        </div>
        <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea id="editCustomerNotes"></textarea>
        </div>
        <div class="modal-btns">
            <button class="btn-primary"   id="submitEditCustomer">Save</button>
            <button class="btn-secondary" id="closeEditModal">Cancel</button>
        </div>
    </div>
</div>

<div id="voiceModal" class="modal">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-title">Voice Entry</div>
        <div id="voiceContent"></div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <div class="modal-handle"></div>
        <div class="modal-title" id="confirmTitle"></div>
        <p id="confirmMessage" style="color:#6e6e73;font-size:16px;margin-bottom:24px"></p>
        <div class="modal-btns">
            <button id="confirmYes">Yes</button>
            <button class="btn-secondary" id="confirmNo">Cancel</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
var CORRECT_PIN = '4321';

firebase.initializeApp({
    apiKey:            "AIzaSyDaQPed0WWrMEAnk4au7eGWWClw3OmbF5I",
    authDomain:        "kirana-389ab.firebaseapp.com",
    databaseURL:       "https://kirana-389ab-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "kirana-389ab",
    storageBucket:     "kirana-389ab.firebasestorage.app",
    messagingSenderId: "130371493680",
    appId:             "1:130371493680:web:85ee7fa639adb3f9e3f2f5"
});
var db = firebase.database();

var shopPath = null, unsubscribers = [], _customers = {}, _transactions = {}, currentCustomerId = null;

// ── PIN ──────────────────────────────────────────────────────────────────────
document.getElementById('pinEnterBtn').addEventListener('click', attemptLogin);
document.getElementById('pinInput').addEventListener('keyup', function(e){ if(e.key==='Enter') attemptLogin(); });

function attemptLogin(){
    var pin = document.getElementById('pinInput').value.trim();
    document.getElementById('pinErrorMsg').textContent = '';
    if(pin.length < 4){ showPinError('PIN must be at least 4 digits'); return; }
    if(pin !== CORRECT_PIN){ showPinError('Wrong PIN — please try again'); document.getElementById('pinInput').value=''; return; }
    var btn = document.getElementById('pinEnterBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Opening…';
    db.ref('shops/'+pin+'/meta').once('value').then(function(s){
        if(!s.exists()) return db.ref('shops/'+pin+'/meta').set({created: new Date().toISOString()});
    }).then(function(){
        sessionStorage.setItem('kirana_pin', pin); enterApp(pin);
    }).catch(function(e){
        showPinError('Cannot connect — check internet'); console.error(e);
        btn.disabled=false; btn.innerHTML='Open Shop';
    });
}
function showPinError(msg){
    document.getElementById('pinErrorMsg').textContent = msg;
    var i = document.getElementById('pinInput');
    i.classList.add('pin-error'); setTimeout(function(){ i.classList.remove('pin-error'); }, 400);
    var btn = document.getElementById('pinEnterBtn'); btn.disabled=false; btn.innerHTML='Open Shop';
}

// ── APP ENTRY / EXIT ─────────────────────────────────────────────────────────
function enterApp(pin){
    shopPath = 'shops/'+pin;
    document.getElementById('pinScreen').style.display  = 'none';
    document.getElementById('appWrapper').style.display = 'block';
    subscribeToFirebase();
}
function logout(){
    unsubscribers.forEach(function(fn){ fn(); }); unsubscribers=[];
    _customers={}; _transactions={}; shopPath=null; currentCustomerId=null;
    sessionStorage.removeItem('kirana_pin');
    document.getElementById('appWrapper').style.display='none';
    document.getElementById('pinScreen').style.display='flex';
    document.getElementById('pinInput').value='';
    document.getElementById('pinErrorMsg').textContent='';
    document.getElementById('pinEnterBtn').innerHTML='Open Shop';
    document.getElementById('pinEnterBtn').disabled=false;
}

// ── SYNC ─────────────────────────────────────────────────────────────────────
function subscribeToFirebase(){
    var dot = document.getElementById('syncDot'); dot.className='sync-dot syncing';
    var cr = db.ref(shopPath+'/customers');
    cr.on('value', function(s){ _customers=s.val()||{}; dot.className='sync-dot'; refresh(); }, function(){ dot.className='sync-dot offline'; });
    var tr = db.ref(shopPath+'/transactions');
    tr.on('value', function(s){ _transactions=s.val()||{}; refresh(); });
    unsubscribers.push(function(){ cr.off(); }); unsubscribers.push(function(){ tr.off(); });
}
function refresh(){ currentCustomerId ? renderDetail() : renderDashboard(); }

// ── DATA HELPERS ─────────────────────────────────────────────────────────────
function getCustomers(){ return Object.values(_customers); }
function getTransactions(){ return Object.values(_transactions); }
function getBalance(cid){
    var d=0, p=0;
    getTransactions().filter(function(t){ return t.customer_id===cid; }).forEach(function(t){
        if(t.type==='debit') d+=t.amount; else p+=t.amount;
    });
    return {totalDebit:d, totalPayment:p, balance:d-p};
}
function getTx(cid){
    return getTransactions().filter(function(t){ return t.customer_id===cid; })
        .sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
}
function findCustKey(id){
    for(var e of Object.entries(_customers)) if(e[1].id===id) return e[0];
    return null;
}
function addCustomer(name,notes,cb){
    var c={id:Date.now(),name:name.trim(),notes:(notes||'').trim(),status:'active',created_at:new Date().toISOString()};
    db.ref(shopPath+'/customers').push(c).then(function(){ if(cb) cb(c); });
    return c;
}
function updateCustomer(id,name,notes){
    var k=findCustKey(id); if(k) db.ref(shopPath+'/customers/'+k).update({name:name.trim(),notes:(notes||'').trim()});
}
function archiveCustomer(id){
    var k=findCustKey(id); if(k) db.ref(shopPath+'/customers/'+k).update({status:'archived'});
}
function deleteCustomer(id){
    var k=findCustKey(id); if(k) db.ref(shopPath+'/customers/'+k).remove();
    Object.entries(_transactions).forEach(function(e){ if(e[1].customer_id===id) db.ref(shopPath+'/transactions/'+e[0]).remove(); });
}
function addTransaction(cid,amount,type){
    db.ref(shopPath+'/transactions').push({id:Date.now(),customer_id:cid,amount:parseFloat(amount),type:type,date:new Date().toISOString()});
}
function deleteTx(txId){
    for(var e of Object.entries(_transactions)){ if(e[1].id===txId){ db.ref(shopPath+'/transactions/'+e[0]).remove(); break; } }
}

// ── RENDER DASHBOARD ─────────────────────────────────────────────────────────
function renderDashboard(){
    var list = getCustomers().filter(function(c){ return c.status==='active'; });
    var con  = document.getElementById('customersContainer');
    if(!list.length){
        con.innerHTML='<p style="color:#aaa;text-align:center;padding:48px 0;font-size:16px">No customers yet — tap Add Customer above.</p>';
        return;
    }
    con.innerHTML = list.map(function(c){
        var b=getBalance(c.id), cls=b.balance>0?'bal-negative':'bal-positive';
        return '<div class="customer-card" onclick="showDetail('+c.id+')">'+
            '<div class="customer-name">'+c.name+'</div>'+
            '<div class="stat-row"><span class="stat-label">Debit</span><span class="stat-value">₹'+b.totalDebit+'</span></div>'+
            '<div class="stat-row"><span class="stat-label">Paid</span><span class="stat-value">₹'+b.totalPayment+'</span></div>'+
            '<div class="balance-row"><span class="bal-label">Balance</span><span class="'+cls+'">₹'+b.balance+'</span></div>'+
            '</div>';
    }).join('');
}

// ── RENDER DETAIL ─────────────────────────────────────────────────────────────
function renderDetail(){
    var c=getCustomers().find(function(c){ return c.id===currentCustomerId; }); if(!c) return;
    document.getElementById('detailCustomerTitle').textContent = c.name;
    document.getElementById('detailCustomerNotes').textContent = c.notes||'';
    var b=getBalance(c.id), hero=document.getElementById('detailBalanceCard');
    hero.className = b.balance>5000 ? 'balance-hero over' : 'balance-hero';
    hero.innerHTML =
        '<div class="bh-label">Outstanding Balance</div>'+
        '<div class="bh-amount">₹'+b.balance+'</div>'+
        '<div class="bh-split">'+
        '<div><div class="bh-split-label">Total Debit</div><div class="bh-split-val">₹'+b.totalDebit+'</div></div>'+
        '<div><div class="bh-split-label">Total Paid</div><div class="bh-split-val">₹'+b.totalPayment+'</div></div>'+
        '</div>';
    var txs=getTx(c.id), con=document.getElementById('transactionsContainer');
    if(!txs.length){ con.innerHTML='<div class="empty-msg">No transactions yet</div>'; return; }
    con.innerHTML=txs.map(function(t){
        var d=new Date(t.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
        var cls=t.type==='debit'?'tx-debit':'tx-payment';
        var sign=t.type==='debit'?'+':'-';
        return '<div class="tx-item">'+
            '<div><div class="tx-date">'+d+'</div><div class="tx-type">'+(t.type==='debit'?'Debit':'Payment')+'</div></div>'+
            '<div class="tx-right"><span class="tx-amount '+cls+'">'+sign+'₹'+t.amount+'</span>'+
            '<button class="tx-del" onclick="confirmDeleteTx('+t.id+')">✕</button></div></div>';
    }).join('');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showDetail(id){
    currentCustomerId=id;
    document.getElementById('dashboardView').style.display='none';
    document.getElementById('detailView').classList.add('active');
    renderDetail();
}
function showDashboard(){
    currentCustomerId=null;
    document.getElementById('dashboardView').style.display='block';
    document.getElementById('detailView').classList.remove('active');
    renderDashboard();
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function showModal(id){ document.getElementById(id).classList.add('active'); }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }
function showConfirm(title,msg,label,cls,onYes){
    document.getElementById('confirmTitle').textContent=title;
    document.getElementById('confirmMessage').textContent=msg;
    var y=document.getElementById('confirmYes'); y.textContent=label; y.className=cls; y.onclick=onYes;
    showModal('confirmModal');
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('backBtn').addEventListener('click', showDashboard);
document.getElementById('confirmNo').addEventListener('click', function(){ closeModal('confirmModal'); });

document.getElementById('addCustomerBtn').addEventListener('click', function(){
    document.getElementById('customerName').value=''; document.getElementById('customerNotes').value='';
    showModal('addCustomerModal'); setTimeout(function(){ document.getElementById('customerName').focus(); },120);
});
document.getElementById('closeAddModal').addEventListener('click', function(){ closeModal('addCustomerModal'); });
document.getElementById('submitAddCustomer').addEventListener('click', function(){
    var n=document.getElementById('customerName').value.trim();
    if(!n){ alert('Please enter a name'); return; }
    addCustomer(n, document.getElementById('customerNotes').value);
    closeModal('addCustomerModal');
});

document.getElementById('editCustomerBtn').addEventListener('click', function(){
    var c=getCustomers().find(function(c){ return c.id===currentCustomerId; });
    document.getElementById('editCustomerName').value=c.name;
    document.getElementById('editCustomerNotes').value=c.notes||'';
    showModal('editCustomerModal');
});
document.getElementById('closeEditModal').addEventListener('click', function(){ closeModal('editCustomerModal'); });
document.getElementById('submitEditCustomer').addEventListener('click', function(){
    var n=document.getElementById('editCustomerName').value.trim();
    if(!n){ alert('Name cannot be empty'); return; }
    updateCustomer(currentCustomerId, n, document.getElementById('editCustomerNotes').value);
    closeModal('editCustomerModal');
});

document.getElementById('savePaymentBtn').addEventListener('click', function(){
    var amt=parseFloat(document.getElementById('paymentAmount').value);
    if(isNaN(amt)||amt<=0){ alert('Enter a valid amount'); return; }
    var b=getBalance(currentCustomerId);
    if(amt>b.balance){ alert('Cannot exceed balance of ₹'+b.balance); return; }
    addTransaction(currentCustomerId, amt, 'payment');
    document.getElementById('paymentAmount').value='';
});

document.getElementById('archiveBtn').addEventListener('click', function(){
    var c=getCustomers().find(function(c){ return c.id===currentCustomerId; });
    showConfirm('Archive customer?', c.name+' will be hidden from the dashboard.', 'Archive','btn-warning', function(){
        archiveCustomer(currentCustomerId); closeModal('confirmModal'); showDashboard();
    });
});
document.getElementById('deleteBtn').addEventListener('click', function(){
    var c=getCustomers().find(function(c){ return c.id===currentCustomerId; });
    showConfirm('Delete customer?', 'All transactions for '+c.name+' will be removed. This cannot be undone.', 'Delete','btn-danger', function(){
        deleteCustomer(currentCustomerId); closeModal('confirmModal'); showDashboard();
    });
});
function confirmDeleteTx(txId){
    showConfirm('Delete transaction?','This cannot be undone.','Delete','btn-danger',function(){
        deleteTx(txId); closeModal('confirmModal');
    });
}

// ── VOICE ─────────────────────────────────────────────────────────────────────
document.getElementById('voiceBtn').addEventListener('click', openVoice);

function openVoice(){
    document.getElementById('voiceContent').innerHTML =
        '<div class="voice-tip">Say a name then an amount — e.g. <strong>"Ramesh 150"</strong></div>'+
        '<div class="voice-status" id="voiceStatus"></div>'+
        '<div class="form-group">'+
        '<label class="form-label">Or type</label>'+
        '<input type="text" id="voiceInput" placeholder="Ramesh 150" style="font-size:18px">'+
        '</div>'+
        '<div id="voiceParsed"></div>'+
        '<div class="modal-btns">'+
        '<button class="btn-primary" id="parseBtn" style="font-size:17px;padding:16px">Parse</button>'+
        '<button class="btn-secondary" id="closeVoiceBtn" style="font-size:17px;padding:16px">Cancel</button>'+
        '</div>';
    showModal('voiceModal');
    document.getElementById('closeVoiceBtn').onclick = function(){ closeModal('voiceModal'); };
    document.getElementById('parseBtn').onclick = parseVoice;
    document.getElementById('voiceInput').addEventListener('keyup', function(e){ if(e.key==='Enter') parseVoice(); });
    startVoice();
}

function startVoice(){
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    var st = document.getElementById('voiceStatus');
    if(!SR){ st.innerHTML='<span style="color:#dc2626">Voice not supported in this browser</span>'; return; }
    var r=new SR(); r.language='en-IN'; r.continuous=false; r.interimResults=false;
    st.innerHTML='<span class="mic-pulse"></span> Listening…';
    r.onresult=function(e){
        var t=''; for(var i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript;
        document.getElementById('voiceInput').value=t.trim();
        st.innerHTML=''; parseVoice();
    };
    r.onerror=function(e){ st.innerHTML='<span style="color:#dc2626">'+e.error+'</span>'; };
    r.start();
}

function parseVoice(){
    var raw=document.getElementById('voiceInput').value.trim();
    var parts=raw.split(/\s+/);
    var out=document.getElementById('voiceParsed');
    if(parts.length<2){ out.innerHTML='<p style="color:#dc2626;font-size:14px;margin-top:10px">Say name then amount, e.g. "Ramesh 150"</p>'; return; }
    var amount=parseFloat(parts[parts.length-1]);
    var name=parts.slice(0,-1).join(' ');
    if(isNaN(amount)||amount<=0){ out.innerHTML='<p style="color:#dc2626;font-size:14px;margin-top:10px">Last word must be a number</p>'; return; }

    out.innerHTML='<div class="parsed-box"><div class="parsed-name-text">'+name+'</div><div class="parsed-amt-text">₹'+amount+'</div></div>';

    var btn=document.getElementById('parseBtn');
    btn.textContent='Confirm'; btn.className='btn-success';
    btn.onclick=function(){
        var existing=getCustomers().find(function(c){ return c.name.toLowerCase()===name.toLowerCase(); });
        if(existing){
            // ── no second confirm, just save and close ──
            addTransaction(existing.id, amount, 'debit');
            closeModal('voiceModal');
        } else {
            // ── new customer: one confirm only ──
            showConfirm(
                'New customer?',
                '"'+name+'" is not in your list. Add them and record ₹'+amount+' debit?',
                'Add & Save', 'btn-primary',
                function(){
                    closeModal('confirmModal');
                    addCustomer(name,'',function(c){
                        addTransaction(c.id, amount, 'debit');
                        closeModal('voiceModal');
                    });
                }
            );
        }
    };
}

// ── AUTO LOGIN ────────────────────────────────────────────────────────────────
var _saved=sessionStorage.getItem('kirana_pin');
if(_saved && _saved===CORRECT_PIN) enterApp(_saved);
